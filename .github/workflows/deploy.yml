name: Deploy POS System
on:
  push:
    branches: [ deploy ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t pos-system-image . && docker save pos-system-image > image.tar
      - name: Copy to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "image.tar"
          target: "/home/${{ secrets.VM_USER }}/"
      - name: Deploy on VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker stop pos-system-container || true
            docker rm pos-system-container || true
            docker load < image.tar
            docker run -d --name pos-system-container -p 5000:5000 pos-system-image